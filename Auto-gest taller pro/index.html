<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoGest Taller Pro - Login</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="login-bg">
    <div class="login-container">
        <div class="login-card">
            <!-- Logo -->
            <div class="logo-container">
                <div class="logo-circle">
                    <i class="fas fa-tools"></i>
                </div>
                <h1 class="app-title">AutoGest Taller Pro</h1>
                <p class="app-subtitle">Módulo de Recepción de Vehículos</p>
            </div>

            <!-- Formulario de Login -->
            <form id="loginForm" class="login-form">
                <div class="input-group">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" id="username" placeholder="Usuario" required>
                </div>

                <div class="input-group">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="password" placeholder="Contraseña" required>
                    <button type="button" class="toggle-password" onclick="togglePassword()">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>

                <div class="remember-forgot">
                    <label class="checkbox-label">
                        <input type="checkbox"> Recordar sesión
                    </label>
                    <a href="#" class="forgot-link">¿Olvidó su contraseña?</a>
                </div>

                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> Ingresar al Sistema
                </button>
            </form>

            <!-- Footer -->
            <div class="login-footer">
                <p>Sistema diseñado para entidades estatales<br>Versión 1.0 - 2025</p>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
